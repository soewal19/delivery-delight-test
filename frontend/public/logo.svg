<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with a gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B6B" />
      <stop offset="100%" stop-color="#FF4757" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" />
  
  <!-- Stylized Burger + Delivery Box Icon -->
  <g filter="url(#shadow)">
    <!-- Bottom Bun -->
    <path d="M150 340C150 360 180 380 256 380C332 380 362 360 362 340H150Z" fill="#FFA502" stroke="white" stroke-width="12" stroke-linejoin="round" />
    
    <!-- Patty -->
    <rect x="140" y="300" width="232" height="30" rx="15" fill="#5D3F32" stroke="white" stroke-width="8" />
    
    <!-- Cheese -->
    <path d="M140 290L372 290L350 320H162L140 290Z" fill="#ECCC68" />
    
    <!-- Lettuce -->
    <path d="M145 275C145 275 160 260 180 275C200 290 220 260 240 275C260 290 280 260 300 275C320 290 340 260 360 275C380 290 367 275 367 275" stroke="#2ED573" stroke-width="15" stroke-linecap="round" />
    
    <!-- Top Bun -->
    <path d="M150 260C150 200 190 160 256 160C322 160 362 200 362 260H150Z" fill="#FFA502" stroke="white" stroke-width="12" stroke-linejoin="round" />
    
    <!-- Sesame Seeds -->
    <circle cx="210" cy="200" r="6" fill="white" opacity="0.8" />
    <circle cx="256" cy="185" r="6" fill="white" opacity="0.8" />
    <circle cx="302" cy="200" r="6" fill="white" opacity="0.8" />
    <circle cx="230" cy="225" r="6" fill="white" opacity="0.8" />
    <circle cx="282" cy="225" r="6" fill="white" opacity="0.8" />
    
    <!-- Delivery Speed Lines -->
    <path d="M80 200H120" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.6" />
    <path d="M60 256H110" stroke="white" stroke-width="12" stroke-linecap="round" />
    <path d="M80 312H120" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.6" />
  </g>
</svg>
